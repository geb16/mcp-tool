name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Ruff
        run: ruff check .

      - name: Pytest
        env:
          APP_ENV: test
          DATABASE_URL: sqlite+pysqlite:///./test_ci.db
          REDIS_URL: redis://localhost:6379/15
          MCP_API_KEY: ci-test-key
          REQUIRE_TENANT_HEADER: "false"
        run: pytest -q

      - name: Docker build
        run: docker build -t mcp-enterprise:${{ github.sha }} .
